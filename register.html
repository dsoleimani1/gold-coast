<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GCC — Create Account</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6e6e6;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .box{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:40px;width:100%;max-width:400px}
  h2{color:#c9a030;margin-bottom:24px;font-size:1.4rem}
  input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 14px;color:#e6e6e6;font-size:0.9rem;margin-bottom:14px;outline:none}
  input:focus{border-color:#c9a030}
  button{width:100%;background:#c9a030;color:#0d1117;border:none;border-radius:6px;padding:12px;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:6px}
  .err{color:#e05252;font-size:0.82rem;margin-top:10px}
  .ok{color:#4caf50;font-size:0.9rem;margin-top:10px}
</style>
</head>
<body>
<div class="box">
  <h2>Create Account</h2>
  <input id="name"     type="text"     placeholder="Your name" />
  <input id="email"    type="email"    placeholder="Email" />
  <input id="password" type="password" placeholder="Password (min 8 chars)" />
  <button onclick="register()">Create Account</button>
  <div id="msg"></div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) document.getElementById('msg').innerHTML = '<div class="err">Invalid invite link.</div>';

async function register() {
  const name     = document.getElementById('name').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg      = document.getElementById('msg');
  if (!name || !email || !password) { msg.innerHTML = '<div class="err">All fields required.</div>'; return; }
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, name, email, password })
    });
    const d = await r.json();
    if (!r.ok) { msg.innerHTML = `<div class="err">${d.error}</div>`; return; }
    msg.innerHTML = '<div class="ok">Account created! Redirecting…</div>';
    setTimeout(() => location.href = '/', 1500);
  } catch(e) {
    msg.innerHTML = '<div class="err">Network error. Try again.</div>';
  }
}
</script>
</body>
</html>
